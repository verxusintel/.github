name: Reusable - Preview Cleanup

on:
  workflow_call:
    inputs:
      preview-strategy:
        required: true
        type: string
        description: "s3 or k8s"
      preview-bucket:
        required: false
        type: string
      pr-number:
        required: true
        type: number
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

env:
  PREVIEW_STRATEGY: ${{ inputs.preview-strategy }}
  PREVIEW_BUCKET: ${{ inputs.preview-bucket }}
  PR_NUMBER: ${{ inputs.pr-number }}

jobs:
  cleanup:
    runs-on: agent-runner
    steps:
      - name: Cleanup S3 preview
        if: env.PREVIEW_STRATEGY == 's3' && env.PREVIEW_BUCKET != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 rm "s3://${PREVIEW_BUCKET}/preview/pr-${PR_NUMBER}/" --recursive
          echo "Cleaned up S3 preview for PR #${PR_NUMBER}"

      - name: Cleanup K8s preview
        if: env.PREVIEW_STRATEGY == 'k8s'
        run: |
          POD_NAME="preview-pr-${PR_NUMBER}"
          kubectl delete pod "$POD_NAME" --ignore-not-found=true
          kubectl delete service "$POD_NAME" --ignore-not-found=true
          echo "Cleaned up K8s preview for PR #${PR_NUMBER}"
