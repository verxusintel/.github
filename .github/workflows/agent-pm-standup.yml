name: Agent PM - Daily Standup

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

jobs:
  standup:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4

      - name: Gather data from Linear
        id: linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d 2>/dev/null || date -v-1d +%Y-%m-%d)
          curl -sf -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"{ issues(filter: { updatedAt: { gte: \\\"${YESTERDAY}T00:00:00Z\\\" } }) { nodes { identifier title state { name } assignee { name } updatedAt } } }\"}" \
            -o /tmp/linear-data.json || echo '{"data":{"issues":{"nodes":[]}}}' > /tmp/linear-data.json

      - name: Gather data from GitHub
        env:
          GH_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: |
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d 2>/dev/null || date -v-1d +%Y-%m-%d)
          gh api graphql -f query="
            {
              search(query: \"org:verxus updated:>=${YESTERDAY}\", type: ISSUE, first: 100) {
                nodes {
                  ... on Issue { number title state repository { name } }
                  ... on PullRequest { number title state repository { name } merged }
                }
              }
            }
          " > /tmp/github-data.json 2>/dev/null || echo '{"data":{"search":{"nodes":[]}}}' > /tmp/github-data.json

      - name: Generate standup with Opus
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-opus-4-6
          max_turns: 10
          timeout_minutes: 10
          prompt: |
            You are a PM assistant at VerXus generating a daily standup report.

            Read these data files:
            - /tmp/linear-data.json (Linear issues updated since yesterday)
            - /tmp/github-data.json (GitHub activity since yesterday)

            Generate a concise standup report with these sections:
            - **Completed**: PRs merged, issues closed
            - **In Progress**: Active work, open PRs
            - **Blocked**: Issues needing attention
            - **Agent Activity**: Summary of agent-generated PRs

            Format as Slack-compatible markdown. Write to /tmp/standup.md

      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          STANDUP=$(cat /tmp/standup.md 2>/dev/null || echo "Standup generation failed.")
          PAYLOAD=$(jq -n --arg text "$STANDUP" '{"text": $text}')
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "$PAYLOAD" || true
