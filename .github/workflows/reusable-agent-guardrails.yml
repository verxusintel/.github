name: Reusable - Agent Guardrails

on:
  workflow_call:
    inputs:
      forbidden-paths:
        required: true
        type: string
        description: "JSON array of glob patterns for forbidden files"
      max-diff-lines:
        required: false
        type: number
        default: 500

env:
  FORBIDDEN_PATHS: ${{ inputs.forbidden-paths }}
  MAX_DIFF_LINES: ${{ inputs.max-diff-lines }}
  BASE_REF: ${{ github.event.pull_request.base.ref }}
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  guardrails:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check forbidden files
        run: |
          DIFF_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          VIOLATIONS=""
          for pattern in $(echo "$FORBIDDEN_PATHS" | jq -r '.[]'); do
            MATCHED=$(echo "$DIFF_FILES" | grep -E "$pattern" || true)
            if [ -n "$MATCHED" ]; then
              VIOLATIONS="${VIOLATIONS}Forbidden pattern '${pattern}' matched:\n${MATCHED}\n\n"
            fi
          done
          if [ -n "$VIOLATIONS" ]; then
            echo "FORBIDDEN_VIOLATIONS<<EOF" >> "$GITHUB_ENV"
            echo -e "$VIOLATIONS" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
            echo "HAS_FORBIDDEN=true" >> "$GITHUB_ENV"
          fi

      - name: Check diff size
        run: |
          STATS=$(git diff --shortstat "origin/${BASE_REF}...HEAD")
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo 0)
          TOTAL=$((${INSERTIONS:-0} + ${DELETIONS:-0}))
          echo "DIFF_TOTAL=$TOTAL" >> "$GITHUB_ENV"
          if [ "$TOTAL" -gt "$MAX_DIFF_LINES" ]; then
            echo "DIFF_TOO_LARGE=true" >> "$GITHUB_ENV"
          fi

      - name: Check dependency pinning
        run: |
          DIFF=$(git diff "origin/${BASE_REF}...HEAD" -- '*/package.json' 'package.json' || true)
          if [ -n "$DIFF" ]; then
            UNPINNED=$(echo "$DIFF" | grep -E '^\+.*["'"'"']\s*:\s*["'"'"'][\^~]' || true)
            if [ -n "$UNPINNED" ]; then
              echo "UNPINNED_DEPS<<EOF" >> "$GITHUB_ENV"
              echo "$UNPINNED" >> "$GITHUB_ENV"
              echo "EOF" >> "$GITHUB_ENV"
              echo "HAS_UNPINNED=true" >> "$GITHUB_ENV"
            fi
          fi

      - name: Check new deps exist
        run: |
          DIFF=$(git diff "origin/${BASE_REF}...HEAD" -- '*/package.json' 'package.json' || true)
          NEW_DEPS=$(echo "$DIFF" | grep -E '^\+.*"[^"]+"\s*:\s*"' | grep -vE '^\+\+\+' | sed -E 's/.*"([^"]+)"\s*:\s*".*/\1/' | sort -u || true)
          WARNINGS=""
          for dep in $NEW_DEPS; do
            [[ "$dep" =~ ^(@types/|typescript|eslint) ]] && continue
            RESP=$(curl -sf "https://registry.npmjs.org/$dep" 2>/dev/null || echo "{}")
            CREATED=$(echo "$RESP" | jq -r '.time.created // empty' 2>/dev/null || true)
            if [ -n "$CREATED" ]; then
              CREATED_TS=$(date -d "$CREATED" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%S" "${CREATED%%.*}" +%s 2>/dev/null || echo 0)
              THIRTY_DAYS_AGO=$(date -d "-30 days" +%s 2>/dev/null || date -v-30d +%s 2>/dev/null || echo 0)
              if [ "$CREATED_TS" -gt "$THIRTY_DAYS_AGO" ] 2>/dev/null; then
                WARNINGS="${WARNINGS}- **${dep}**: created less than 30 days ago\n"
              fi
            fi
            WEEKLY=$(echo "$RESP" | jq -r '.downloads // 0' 2>/dev/null || echo "0")
            if [ "$WEEKLY" != "null" ] && [ "${WEEKLY:-0}" -lt 100 ] 2>/dev/null; then
              WARNINGS="${WARNINGS}- **${dep}**: low weekly downloads (<100)\n"
            fi
          done
          if [ -n "$WARNINGS" ]; then
            echo "DEP_WARNINGS<<EOF" >> "$GITHUB_ENV"
            echo -e "$WARNINGS" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi

      - name: Suspicious patterns scan
        run: |
          DIFF=$(git diff "origin/${BASE_REF}...HEAD")
          SUSPICIOUS=$(echo "$DIFF" | grep -nE '^\+.*(curl\s.*\|\s*sh|child_process|subprocess|authorized_keys|process\.env\[)' || true)
          if [ -n "$SUSPICIOUS" ]; then
            echo "SUSPICIOUS_PATTERNS<<EOF" >> "$GITHUB_ENV"
            echo "$SUSPICIOUS" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
            echo "HAS_SUSPICIOUS=true" >> "$GITHUB_ENV"
          fi

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --diff

      - name: Report violations
        if: always() && (env.HAS_FORBIDDEN == 'true' || env.DIFF_TOO_LARGE == 'true' || env.HAS_UNPINNED == 'true' || env.HAS_SUSPICIOUS == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const parts = ['## Agent Guardrails Report\n'];
            if (process.env.HAS_FORBIDDEN === 'true') {
              parts.push(`### Forbidden Files\n\`\`\`\n${process.env.FORBIDDEN_VIOLATIONS}\`\`\`\n`);
            }
            if (process.env.DIFF_TOO_LARGE === 'true') {
              parts.push(`### Diff Too Large\nTotal: ${process.env.DIFF_TOTAL} lines (max: ${process.env.MAX_DIFF_LINES})\n`);
            }
            if (process.env.HAS_UNPINNED === 'true') {
              parts.push(`### Unpinned Dependencies\n\`\`\`\n${process.env.UNPINNED_DEPS}\`\`\`\n`);
            }
            if (process.env.DEP_WARNINGS) {
              parts.push(`### New Dependency Warnings\n${process.env.DEP_WARNINGS}\n`);
            }
            if (process.env.HAS_SUSPICIOUS === 'true') {
              parts.push(`### Suspicious Patterns\n\`\`\`\n${process.env.SUSPICIOUS_PATTERNS}\`\`\`\n`);
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: parts.join('\n')
            });
            core.setFailed('Guardrail violations detected');
