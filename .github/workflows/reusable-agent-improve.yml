name: Reusable - Agent Proactive Improvements

on:
  workflow_call:
    inputs:
      repo-type:
        required: true
        type: string
      build-cmd:
        required: true
        type: string
      test-cmd:
        required: true
        type: string
      forbidden-paths:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

env:
  REPO_TYPE: ${{ inputs.repo-type }}
  BUILD_CMD: ${{ inputs.build-cmd }}
  TEST_CMD: ${{ inputs.test-cmd }}
  FORBIDDEN_PATHS: ${{ inputs.forbidden-paths }}

jobs:
  improve:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rate limit check
        id: rate-limit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          AGENT_PRS=$(gh pr list --label agent-generated --search "created:>=${TODAY}" --json number --jq 'length')
          if [ "${AGENT_PRS:-0}" -ge 3 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Rate limit: ${AGENT_PRS} agent PRs today, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup git
        if: steps.rate-limit.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "verxus-agent[bot]"
          git config user.email "agent@verxus.io"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          BRANCH_NAME="agent/improve-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH_NAME"
          echo "IMPROVE_BRANCH=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Install deps
        if: steps.rate-limit.outputs.skip != 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci 2>/dev/null || npm install || true
          elif [ -f bun.lock ] || [ -f bun.lockb ]; then bun install || true
          fi
        continue-on-error: true

      - name: Find and implement improvement (Haiku)
        if: steps.rate-limit.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx --yes @anthropic-ai/claude-code@latest -p \
            "Find ONE small improvement (<200 lines) in this repo. Read SPECS.md for context. Repo type: ${REPO_TYPE}. Build: ${BUILD_CMD}. Test: ${TEST_CMD}. Forbidden: ${FORBIDDEN_PATHS}. Examples: dead code, missing error handling, type safety, performance. Make the change, run build to verify. NEVER touch forbidden paths." \
            --model claude-haiku-4-5-20251001 \
            --max-turns 20 \
            --dangerously-skip-permissions

      - name: Create PR
        if: steps.rate-limit.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(git branch --show-current)
          if [[ "$BRANCH" != agent/improve-* ]]; then
            echo "No improvement branch created, skipping PR"
            exit 0
          fi
          git push origin "$BRANCH"
          SUMMARY=$(cat /tmp/improvement-summary.md 2>/dev/null || echo "Proactive improvement")
          gh pr create \
            --title "agent: ${BRANCH#agent/}" \
            --body "${SUMMARY}

          ---
          *Generated by VerXus Agent Pipeline - Proactive Improvement*" \
            --head "$BRANCH" \
            --label agent-generated \
            --label improvement

      - name: Notify Slack
        if: steps.rate-limit.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          BRANCH=$(git branch --show-current)
          MSG="Agent Improvement PR created: ${{ github.repository }} - ${BRANCH}"
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MSG\"}" || true
