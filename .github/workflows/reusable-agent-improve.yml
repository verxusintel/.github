name: Reusable - Agent Proactive Improvements

on:
  workflow_call:
    inputs:
      repo-type:
        required: true
        type: string
      build-cmd:
        required: true
        type: string
      test-cmd:
        required: true
        type: string
      forbidden-paths:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

env:
  REPO_TYPE: ${{ inputs.repo-type }}
  BUILD_CMD: ${{ inputs.build-cmd }}
  TEST_CMD: ${{ inputs.test-cmd }}
  FORBIDDEN_PATHS: ${{ inputs.forbidden-paths }}

jobs:
  improve:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rate limit check
        id: rate-limit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          AGENT_PRS=$(gh pr list --label agent-generated --search "created:>=${TODAY}" --json number --jq 'length')
          if [ "${AGENT_PRS:-0}" -ge 3 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Rate limit: ${AGENT_PRS} agent PRs today, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find improvement with Haiku
        if: steps.rate-limit.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 30"
          prompt: |
            You are a proactive improvement agent at VerXus.

            Repo type from env REPO_TYPE. Build from env BUILD_CMD. Test from env TEST_CMD.
            Forbidden paths from env FORBIDDEN_PATHS.

            Find ONE small improvement (<200 lines changed) in this repo. Examples:
            - Dead code removal
            - Missing error handling
            - Test coverage gaps
            - Performance optimization
            - Dependency updates
            - Type safety improvements

            Rules:
            - NEVER touch forbidden paths
            - Keep changes under 200 lines
            - Must pass build and tests
            - Only ONE improvement per run

            Create a branch named agent/improve-<short-description>.
            Make the changes, run build and tests.
            Write a summary to /tmp/improvement-summary.md

      - name: Create PR
        if: steps.rate-limit.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(git branch --show-current)
          if [[ "$BRANCH" != agent/improve-* ]]; then
            echo "No improvement branch created, skipping PR"
            exit 0
          fi
          git push origin "$BRANCH"
          SUMMARY=$(cat /tmp/improvement-summary.md 2>/dev/null || echo "Proactive improvement")
          gh pr create \
            --title "agent: ${BRANCH#agent/}" \
            --body "${SUMMARY}

          ---
          *Generated by VerXus Agent Pipeline - Proactive Improvement*" \
            --head "$BRANCH" \
            --label agent-generated \
            --label improvement

      - name: Notify Slack
        if: steps.rate-limit.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          BRANCH=$(git branch --show-current)
          MSG="Agent Improvement PR created: ${{ github.repository }} - ${BRANCH}"
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MSG\"}" || true
