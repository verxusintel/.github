name: Reusable - Agent Review Fix

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number
      attempt:
        required: true
        type: number
    secrets:
      ANTHROPIC_API_KEY:
        required: true

concurrency:
  group: agent-review-fix-${{ github.repository }}-${{ inputs.pr-number }}
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ inputs.pr-number }}
  ATTEMPT: ${{ inputs.attempt }}

jobs:
  review-fix:
    runs-on: agent-runner
    steps:
      - name: Escalate if too many attempts
        if: inputs.attempt > 2
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: '**Agent Review Fix: Escalating to human.** Failed after 2 auto-fix attempts.'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              labels: ['needs-human']
            });
            core.setFailed('Escalated after 2 attempts');

      - uses: actions/checkout@v4
        if: inputs.attempt <= 2
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        if: inputs.attempt <= 2
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr checkout "$PR_NUMBER"

      - name: Fix review comments with Haiku
        if: inputs.attempt <= 2
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 30"
          prompt: |
            You are a review fix agent at VerXus.

            Read the review comments for the PR (number in env PR_NUMBER) using gh CLI:
            gh pr view "$PR_NUMBER" --comments
            gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/comments"
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments"

            For each review comment:
            1. Understand the requested change
            2. Implement the fix
            3. Verify the fix compiles/passes tests

            Do NOT argue with reviewers. Implement all requested changes.
            Keep changes focused on what was requested.

      - name: Push fixes
        if: inputs.attempt <= 2
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "agent: address review comments (attempt ${ATTEMPT})"
            git push
          else
            echo "No changes to push"
          fi
