name: Reusable - Agent Review

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

concurrency:
  group: agent-review-${{ github.repository }}-${{ inputs.pr-number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ inputs.pr-number }}

jobs:
  review:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff "$PR_NUMBER" > /tmp/pr-diff.txt 2>/dev/null || echo "No diff" > /tmp/pr-diff.txt
          echo "Diff size: $(wc -l < /tmp/pr-diff.txt) lines"

      - name: Review with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(cat /tmp/pr-diff.txt | head -500)
          npx --yes @anthropic-ai/claude-code@latest -p \
            "You are a senior code reviewer. Review this PR diff and write your review.

            ## PR Diff:
            $DIFF

            ## Check for:
            1. Missing null/undefined checks
            2. Missing error handling
            3. Edge cases ignored
            4. Pattern violations
            5. Performance issues
            6. Security issues (hardcoded secrets, PII logging, injection)
            7. Destructive DB operations

            Write a concise review to /tmp/review.md.
            End with: VERDICT: PASS or VERDICT: FAIL" \
            --model claude-haiku-4-5-20251001 \
            --max-turns 5 \
            --dangerously-skip-permissions

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = 'Review completed but no output file generated.';
            try { review = fs.readFileSync('/tmp/review.md', 'utf8'); } catch(e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `## Agent Review\n\n${review}`
            });

      - name: Update labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr, name: 'status/security-review' }); } catch(e) {}
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, labels: ['status/ready-for-review']
            });
