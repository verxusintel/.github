name: Reusable - Agent QA

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number
      preview-strategy:
        required: true
        type: string
        description: "k3s-frontend, k3s-api, test-only"
      build-cmd:
        required: true
        type: string
      test-cmd:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true

concurrency:
  group: agent-qa-${{ github.repository }}-${{ inputs.pr-number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ inputs.pr-number }}
  PREVIEW_STRATEGY: ${{ inputs.preview-strategy }}
  BUILD_CMD: ${{ inputs.build-cmd }}
  TEST_CMD: ${{ inputs.test-cmd }}
  PREVIEW_HOST: "135.181.35.251"
  K3S_NAMESPACE: "previews"

jobs:
  qa:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout PR branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr checkout "$PR_NUMBER" || true

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then npm ci 2>/dev/null || npm install || true
          elif [ -f bun.lock ] || [ -f bun.lockb ]; then bun install || true
          fi
        continue-on-error: true

      - name: Run tests
        run: eval "$TEST_CMD" || true
        continue-on-error: true

      - name: Build
        if: env.PREVIEW_STRATEGY != 'test-only'
        run: eval "$BUILD_CMD" || true
        continue-on-error: true

      - name: Deploy K3s frontend preview
        if: env.PREVIEW_STRATEGY == 'k3s-frontend'
        run: |
          PREVIEW_NAME="preview-pr-${PR_NUMBER}"
          PREVIEW_PORT=$((31000 + PR_NUMBER % 1000))

          # Create nginx config serving the built dist
          tar czf /tmp/dist.tar.gz dist/ 2>/dev/null || tar czf /tmp/dist.tar.gz build/ 2>/dev/null || echo "No dist dir"

          # Deploy nginx pod with the built files via kubectl on the runner
          # (runner is inside K3s, has kubectl access)
          cat <<YAML | kubectl apply -f - 2>/dev/null || true
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${PREVIEW_NAME}
            namespace: ${K3S_NAMESPACE}
            labels:
              app: preview
              pr: "${PR_NUMBER}"
          spec:
            containers:
              - name: nginx
                image: nginx:alpine
                ports:
                  - containerPort: 80
                resources:
                  requests:
                    cpu: "50m"
                    memory: "32Mi"
                  limits:
                    cpu: "200m"
                    memory: "128Mi"
            restartPolicy: Never
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${PREVIEW_NAME}
            namespace: ${K3S_NAMESPACE}
            labels:
              app: preview
              pr: "${PR_NUMBER}"
          spec:
            type: NodePort
            selector:
              app: preview
              pr: "${PR_NUMBER}"
            ports:
              - port: 80
                targetPort: 80
                nodePort: ${PREVIEW_PORT}
          YAML

          # Wait for pod
          kubectl wait --for=condition=Ready pod/${PREVIEW_NAME} -n ${K3S_NAMESPACE} --timeout=60s 2>/dev/null || true

          # Copy dist files into the pod
          if [ -d dist ]; then
            kubectl cp dist/ ${K3S_NAMESPACE}/${PREVIEW_NAME}:/usr/share/nginx/html/ 2>/dev/null || true
          elif [ -d build ]; then
            kubectl cp build/ ${K3S_NAMESPACE}/${PREVIEW_NAME}:/usr/share/nginx/html/ 2>/dev/null || true
          fi

          echo "PREVIEW_URL=http://${PREVIEW_HOST}:${PREVIEW_PORT}" >> "$GITHUB_ENV"
          echo "Preview deployed at http://${PREVIEW_HOST}:${PREVIEW_PORT}"

      - name: Deploy K3s API preview
        if: env.PREVIEW_STRATEGY == 'k3s-api'
        run: |
          PREVIEW_NAME="preview-pr-${PR_NUMBER}"
          PREVIEW_PORT=$((31000 + PR_NUMBER % 1000))

          cat <<YAML | kubectl apply -f - 2>/dev/null || true
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${PREVIEW_NAME}
            namespace: ${K3S_NAMESPACE}
            labels:
              app: preview
              pr: "${PR_NUMBER}"
          spec:
            containers:
              - name: api
                image: node:22-alpine
                command: ["sh", "-c", "npm start || node dist/main.js"]
                workingDir: /app
                ports:
                  - containerPort: 3000
                env:
                  - name: NODE_ENV
                    value: "test"
                  - name: PORT
                    value: "3000"
                resources:
                  requests:
                    cpu: "200m"
                    memory: "256Mi"
                  limits:
                    cpu: "500m"
                    memory: "512Mi"
            restartPolicy: Never
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${PREVIEW_NAME}
            namespace: ${K3S_NAMESPACE}
          spec:
            type: NodePort
            selector:
              app: preview
              pr: "${PR_NUMBER}"
            ports:
              - port: 3000
                targetPort: 3000
                nodePort: ${PREVIEW_PORT}
          YAML

          echo "PREVIEW_URL=http://${PREVIEW_HOST}:${PREVIEW_PORT}" >> "$GITHUB_ENV"

      - name: Comment preview URL
        if: env.PREVIEW_STRATEGY != 'test-only'
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.PREVIEW_URL || 'N/A';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: `## Preview Deployed\n\nURL: ${url}\n\n*Preview auto-deletes after 4 hours or when PR closes.*`
            });

      - name: Update labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr, name: 'status/qa-testing' }); } catch(e) {}
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, labels: ['status/ready-for-review']
            });

      - name: Dispatch qa-passed
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner, repo: context.repo.repo,
              event_type: 'qa-passed',
              client_payload: { pr_number: Number(process.env.PR_NUMBER) }
            });
