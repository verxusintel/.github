name: Reusable - Agent Rollback

on:
  workflow_call:
    inputs:
      failing-commit:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

env:
  FAILING_COMMIT: ${{ inputs.failing-commit }}

jobs:
  rollback:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Find and revert agent commit
        id: revert
        run: |
          COMMIT_MSG=$(git log --format="%s" -1 "$FAILING_COMMIT" 2>/dev/null || echo "")
          COMMIT_AUTHOR=$(git log --format="%an" -1 "$FAILING_COMMIT" 2>/dev/null || echo "")

          IS_AGENT="false"
          if echo "$COMMIT_MSG" | grep -qE "^agent:|Merge pull request.*agent/"; then
            IS_AGENT="true"
          fi

          if [ "$IS_AGENT" != "true" ]; then
            echo "Commit is not from agent, skipping rollback"
            echo "is_agent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_agent=true" >> "$GITHUB_OUTPUT"

          # Check if it's a merge commit
          PARENT_COUNT=$(git cat-file -p "$FAILING_COMMIT" | grep -c "^parent" || echo "1")
          if [ "$PARENT_COUNT" -gt 1 ]; then
            git revert -m 1 "$FAILING_COMMIT" --no-edit
          else
            git revert "$FAILING_COMMIT" --no-edit
          fi
          git push

      - name: Notify Slack
        if: steps.revert.outputs.is_agent == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          MSG="Agent Rollback: Reverted commit ${FAILING_COMMIT} in ${{ github.repository }} due to CI failure on main."
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MSG\"}" || true
