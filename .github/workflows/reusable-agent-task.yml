name: Reusable - Coding Agent

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      issue-title:
        required: true
        type: string
      issue-body:
        required: true
        type: string
      repo-type:
        required: true
        type: string
      build-cmd:
        required: true
        type: string
      test-cmd:
        required: true
        type: string
      forbidden-paths:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
      LINEAR_API_KEY:
        required: false

concurrency:
  group: agent-coding-${{ github.repository }}-${{ inputs.issue-number }}
  cancel-in-progress: false

env:
  ISSUE_NUMBER: ${{ inputs.issue-number }}
  ISSUE_TITLE: ${{ inputs.issue-title }}
  ISSUE_BODY: ${{ inputs.issue-body }}
  REPO_TYPE: ${{ inputs.repo-type }}
  BUILD_CMD: ${{ inputs.build-cmd }}
  TEST_CMD: ${{ inputs.test-cmd }}
  FORBIDDEN_PATHS: ${{ inputs.forbidden-paths }}

jobs:
  implement:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add status labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              labels: ['status/coding', 'agent-generated']
            });

      - name: Update Linear → In Progress
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          VER_ID=$(echo "$ISSUE_BODY" | grep -oP 'VER-\d+' | head -1 || true)
          if [ -n "$VER_ID" ] && [ -n "$LINEAR_API_KEY" ]; then
            INTERNAL=$(curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"{ issue(id: \\\"$VER_ID\\\") { id } }\"}" | jq -r '.data.issue.id // empty')
            if [ -n "$INTERNAL" ]; then
              curl -s -X POST https://api.linear.app/graphql \
                -H "Authorization: $LINEAR_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"mutation { issueUpdate(id: \\\"$INTERNAL\\\", input: { stateId: \\\"d2eac226-eb3a-4572-8587-a895e4930a6b\\\" }) { success } }\"}" > /dev/null
              echo "Linear $VER_ID → In Progress"
            fi
          fi

      - name: Create branch
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile 2>/dev/null || bun install || true
          elif [ -f package-lock.json ]; then
            npm ci 2>/dev/null || npm install || true
          elif [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile 2>/dev/null || true
          fi
        continue-on-error: true

      - name: Setup git auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "verxus-agent[bot]"
          git config user.email "agent@verxus.io"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Implement (Claude CLI)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx --yes @anthropic-ai/claude-code@latest -p \
            "Implement this task. Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}. ${ISSUE_BODY}. Repo type: ${REPO_TYPE}. Build: ${BUILD_CMD}. Test: ${TEST_CMD}. Forbidden: ${FORBIDDEN_PATHS}. Read SPECS.md first. Make minimal changes. Run build to verify. NEVER modify forbidden files. NEVER destructive migrations. NEVER log PII. Use exact dep versions." \
            --model claude-haiku-4-5-20251001 \
            --max-turns 25 \
            --allowedTools "Bash(git:*)" "Bash(npm:*)" "Bash(npx:*)" "Bash(bun:*)" "Bash(node:*)" "Read" "Write" "Edit" "Glob" "Grep" \
            --dangerously-skip-permissions

      - name: Commit and push
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          # Don't commit lockfiles or node_modules changes
          git checkout -- package-lock.json 2>/dev/null || true
          git checkout -- pnpm-lock.yaml 2>/dev/null || true
          git checkout -- bun.lock 2>/dev/null || true
          git checkout -- bun.lockb 2>/dev/null || true
          git add -A
          git reset HEAD -- node_modules/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "agent: implement #${ISSUE_NUMBER}"

          # Push with force-with-lease as fallback for rebased/amended branches
          if ! git push origin "$BRANCH" 2>/dev/null; then
            echo "Normal push failed, retrying with --force-with-lease"
            git push --force-with-lease origin "$BRANCH"
          fi

          # Create or update PR
          PR_TITLE="agent: #${ISSUE_NUMBER} - ${ISSUE_TITLE}"
          PR_BODY="Closes #${ISSUE_NUMBER}

          ---
          *Generated by VerXus Agent Pipeline*"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "PR #${EXISTING_PR} already exists, updating..."
            gh pr edit "$EXISTING_PR" \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --add-label agent-generated \
              --add-label status/security-review || echo "Warning: failed to update PR #${EXISTING_PR}"
          else
            echo "Creating new PR..."
            if ! gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --head "$BRANCH" \
              --label agent-generated \
              --label status/security-review; then
              echo "PR creation failed, commenting on issue as fallback"
              gh issue comment "${ISSUE_NUMBER}" \
                --body "**Agent Update:** Implementation pushed to branch \`${BRANCH}\` but PR creation failed. Please create the PR manually from this branch." \
                || echo "Warning: failed to comment on issue #${ISSUE_NUMBER}"
            fi
          fi

      - name: Update Linear → In Review
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          VER_ID=$(echo "$ISSUE_BODY" | grep -oP 'VER-\d+' | head -1 || true)
          if [ -n "$VER_ID" ] && [ -n "$LINEAR_API_KEY" ]; then
            INTERNAL=$(curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"{ issue(id: \\\"$VER_ID\\\") { id } }\"}" | jq -r '.data.issue.id // empty')
            if [ -n "$INTERNAL" ]; then
              curl -s -X POST https://api.linear.app/graphql \
                -H "Authorization: $LINEAR_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"mutation { issueUpdate(id: \\\"$INTERNAL\\\", input: { stateId: \\\"271d8187-a0e4-497b-bf55-b69a1b94afe7\\\" }) { success } }\"}" > /dev/null
              echo "Linear $VER_ID → In Review"
            fi
          fi

      - name: Dispatch review
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${context.repo.owner}:agent/issue-${process.env.ISSUE_NUMBER}`,
              state: 'open'
            });
            if (prs.data.length > 0) {
              await github.rest.repos.createDispatchEvent({
                owner: context.repo.owner, repo: context.repo.repo,
                event_type: 'agent-pr-ready',
                client_payload: { pr_number: prs.data[0].number }
              });
            }

  notify:
    needs: implement
    if: always()
    runs-on: agent-runner
    steps:
      - name: Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESULT: ${{ needs.implement.result }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          MSG="Agent Task ${RESULT}: ${{ github.repository }} #${ISSUE_NUMBER}"
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MSG\"}" || true

      - name: Cleanup labels
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(process.env.ISSUE_NUMBER), name: 'status/coding' }); } catch(e) {}
