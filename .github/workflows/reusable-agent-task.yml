name: Reusable - Coding Agent

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      issue-title:
        required: true
        type: string
      issue-body:
        required: true
        type: string
      repo-type:
        required: true
        type: string
      build-cmd:
        required: true
        type: string
      test-cmd:
        required: true
        type: string
      forbidden-paths:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

concurrency:
  group: agent-coding-${{ github.repository }}-${{ inputs.issue-number }}
  cancel-in-progress: false

env:
  ISSUE_NUMBER: ${{ inputs.issue-number }}
  ISSUE_TITLE: ${{ inputs.issue-title }}
  ISSUE_BODY: ${{ inputs.issue-body }}
  REPO_TYPE: ${{ inputs.repo-type }}
  BUILD_CMD: ${{ inputs.build-cmd }}
  TEST_CMD: ${{ inputs.test-cmd }}
  FORBIDDEN_PATHS: ${{ inputs.forbidden-paths }}

jobs:
  plan:
    runs-on: agent-runner
    outputs:
      subtasks: ${{ steps.parse.outputs.subtasks }}
      spec: ${{ steps.parse.outputs.spec }}
      complexity: ${{ steps.parse.outputs.complexity }}
      status: ${{ steps.parse.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add status labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              labels: ['status/coding', 'agent-generated']
            });

      - name: Prepare context
        id: context
        run: |
          # Read SPECS.md for quick context (avoid expensive codebase exploration)
          if [ -f SPECS.md ]; then
            SPECS=$(head -100 SPECS.md)
          else
            SPECS="No SPECS.md found"
          fi
          echo "specs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SPECS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Quick file listing for relevant dirs
          STRUCTURE=$(find src -type f -name "*.ts" -o -name "*.tsx" 2>/dev/null | head -50 || echo "no src dir")
          echo "structure<<EOF" >> "$GITHUB_OUTPUT"
          echo "$STRUCTURE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Plan with Opus
        id: planner
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-6 --max-turns 15"
          prompt: |
            You are the PLANNER. Be fast and focused — do NOT explore the entire codebase.

            ## Issue #${{ env.ISSUE_NUMBER }}: ${{ env.ISSUE_TITLE }}
            ${{ env.ISSUE_BODY }}

            ## Repo: ${{ env.REPO_TYPE }} | Build: ${{ env.BUILD_CMD }} | Test: ${{ env.TEST_CMD }}
            ## Forbidden: ${{ env.FORBIDDEN_PATHS }}

            ## SPECS.md (read this instead of exploring)
            ${{ steps.context.outputs.specs }}

            ## File structure
            ${{ steps.context.outputs.structure }}

            ## Instructions (be quick, max 10 turns)
            1. Based on SPECS.md and file structure, identify the 1-3 files to change
            2. If issue is vague: status=AMBIGUOUS
            3. Classify: L1 (<50 lines), L2 (50-200), L3 (>200 → decompose)
            4. Write ONE focused subtask with exact file paths and instructions
            5. NEVER explore the whole codebase. Use SPECS.md for context.
            6. NEVER plan destructive migrations

            Write JSON to /tmp/plan.json:
            {"status":"READY","complexity":"L1","estimated_lines":30,"spec":"...","subtasks":[{"id":"1","title":"...","files":["src/..."],"instructions":"...","acceptance":"build passes"}]}

      - name: Parse plan
        id: parse
        if: always()
        run: |
          if [ -f /tmp/plan.json ]; then
            STATUS=$(jq -r '.status // "READY"' /tmp/plan.json)
            SUBTASKS=$(jq -c '.subtasks // []' /tmp/plan.json)
            SPEC=$(jq -r '.spec // ""' /tmp/plan.json | head -c 500)
            COMPLEXITY=$(jq -r '.complexity // "L2"' /tmp/plan.json)
          else
            STATUS="READY"
            SUBTASKS='[{"id":"1","title":"implement issue","instructions":"implement as described","acceptance":"build passes","files":[],"existing_utils":[],"needs_human":false}]'
            SPEC="implement the issue"
            COMPLEXITY="L2"
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "subtasks=$SUBTASKS" >> "$GITHUB_OUTPUT"
          echo "spec=$SPEC" >> "$GITHUB_OUTPUT"
          echo "complexity=$COMPLEXITY" >> "$GITHUB_OUTPUT"

      - name: Handle ambiguous
        if: steps.parse.outputs.status == 'AMBIGUOUS'
        uses: actions/github-script@v7
        with:
          script: |
            const num = Number(process.env.ISSUE_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: num,
              body: '**Agent needs clarification.** Please update the issue with more details and re-apply the `agent` label.'
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: num, name: 'agent'
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: num, labels: ['status/ambiguous']
            });

      - name: Auto-decompose L3
        if: steps.parse.outputs.status == 'L3-DECOMPOSE'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = JSON.parse(require('fs').readFileSync('/tmp/plan.json', 'utf8'));
            const parentNumber = Number(process.env.ISSUE_NUMBER);
            if (plan.subtasks.length > 5) { core.setFailed('Max 5 sub-issues'); return; }
            const nums = [];
            for (const st of plan.subtasks) {
              const { data: sub } = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `[Sub] ${process.env.ISSUE_TITLE} - Part ${st.id}: ${st.title}`,
                body: `Parent: #${parentNumber}\n\n## Spec\n${st.instructions}\n\n## Acceptance\n${st.acceptance}`,
                labels: ['agent', 'agent-generated', ...(plan.inherited_labels || [])]
              });
              nums.push(sub.number);
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: parentNumber,
              body: `## Auto-Decomposition\nClassified as L3. Sub-issues:\n${nums.map((n, i) => `- #${n} — ${plan.subtasks[i].title}`).join('\n')}`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: parentNumber, labels: ['status/decomposed']
            });

  execute:
    needs: plan
    if: needs.plan.outputs.status == 'READY'
    runs-on: agent-runner
    strategy:
      matrix:
        subtask: ${{ fromJson(needs.plan.outputs.subtasks) }}
      max-parallel: 3
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup branch
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH" 2>/dev/null || true

      - name: Implement subtask (Haiku)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 15"
          prompt: |
            Implement this subtask: ${{ matrix.subtask.title }}
            Instructions: ${{ matrix.subtask.instructions }}
            Acceptance: ${{ matrix.subtask.acceptance }}
            Build cmd from env BUILD_CMD. Test cmd from env TEST_CMD.
            Forbidden files from env FORBIDDEN_PATHS.
            NEVER write destructive migrations. NEVER log PII. Use exact dep versions.
            Run build before finishing.

      - name: Self-check (Haiku)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 15"
          prompt: |
            SELF-CHECK. Acceptance: ${{ matrix.subtask.acceptance }}
            Verify all criteria met, build passes, no forbidden files touched, no destructive ops. Fix issues.

      - name: Commit
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "agent: subtask ${{ matrix.subtask.id }} - ${{ matrix.subtask.title }}"

  finalize:
    needs: [plan, execute]
    if: needs.plan.outputs.status == 'READY' && needs.execute.result == 'success'
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push branch
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          git checkout "$BRANCH" 2>/dev/null || true
          git push origin "$BRANCH" --force-with-lease 2>/dev/null || git push origin "$BRANCH"

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          SPEC: ${{ needs.plan.outputs.spec }}
          COMPLEXITY: ${{ needs.plan.outputs.complexity }}
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          gh pr create \
            --title "agent: #${ISSUE_NUMBER} - ${ISSUE_TITLE}" \
            --body "$(cat <<EOF
          ## Summary
          ${SPEC}

          ## Complexity: ${COMPLEXITY}
          Closes #${ISSUE_NUMBER}

          ---
          *Generated by VerXus Agent Pipeline*
          EOF
          )" \
            --head "$BRANCH" \
            --label agent-generated \
            --label status/security-review 2>/dev/null || echo "PR may already exist"

      - name: Dispatch review
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${context.repo.owner}:agent/issue-${process.env.ISSUE_NUMBER}`,
              state: 'open'
            });
            if (prs.data.length > 0) {
              await github.rest.repos.createDispatchEvent({
                owner: context.repo.owner, repo: context.repo.repo,
                event_type: 'agent-pr-ready',
                client_payload: { pr_number: prs.data[0].number }
              });
            }

  notify:
    needs: [plan, finalize]
    if: always()
    runs-on: agent-runner
    steps:
      - name: Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESULT: ${{ needs.finalize.result }}
          COMPLEXITY: ${{ needs.plan.outputs.complexity }}
          STATUS: ${{ needs.plan.outputs.status }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          MSG="Agent Task ${RESULT:-$STATUS}: ${{ github.repository }} #${ISSUE_NUMBER} (${COMPLEXITY})"
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MSG\"}" || true

      - name: Cleanup labels
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(process.env.ISSUE_NUMBER), name: 'status/coding' }); } catch(e) {}
