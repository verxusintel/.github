name: Reusable - Coding Agent

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
      issue-title:
        required: true
        type: string
      issue-body:
        required: true
        type: string
      repo-type:
        required: true
        type: string
      build-cmd:
        required: true
        type: string
      test-cmd:
        required: true
        type: string
      forbidden-paths:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: false

concurrency:
  group: agent-coding-${{ github.repository }}-${{ inputs.issue-number }}
  cancel-in-progress: false

env:
  ISSUE_NUMBER: ${{ inputs.issue-number }}
  ISSUE_TITLE: ${{ inputs.issue-title }}
  ISSUE_BODY: ${{ inputs.issue-body }}
  REPO_TYPE: ${{ inputs.repo-type }}
  BUILD_CMD: ${{ inputs.build-cmd }}
  TEST_CMD: ${{ inputs.test-cmd }}
  FORBIDDEN_PATHS: ${{ inputs.forbidden-paths }}

jobs:
  implement:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add status labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              labels: ['status/coding', 'agent-generated']
            });

      - name: Create branch
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"

      - name: Implement (Claude Code)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 15"
          prompt: |
            Implement this task in the codebase.

            ## Issue
            Title: ${{ env.ISSUE_TITLE }}
            Body: ${{ env.ISSUE_BODY }}

            ## Context
            Repo type: ${{ env.REPO_TYPE }}
            Build: ${{ env.BUILD_CMD }}
            Test: ${{ env.TEST_CMD }}
            Forbidden files: ${{ env.FORBIDDEN_PATHS }}

            ## Rules
            - Read SPECS.md first for project context
            - Make focused, minimal changes
            - Run the build command to verify before finishing
            - NEVER modify forbidden files
            - NEVER write destructive DB migrations (DROP, DELETE, TRUNCATE)
            - NEVER log PII (emails, IPs, credentials)
            - Use exact dependency versions (no ^ or ~)
            - Commit your changes with message: "agent: implement #${{ env.ISSUE_NUMBER }}"

      - name: Push and create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}"
          # Commit any uncommitted changes
          git add -A
          git diff --cached --quiet || git commit -m "agent: implement #${ISSUE_NUMBER}"
          # Push
          git push origin "$BRANCH"
          # Create PR
          gh pr create \
            --title "agent: #${ISSUE_NUMBER} - ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}

          ---
          *Generated by VerXus Agent Pipeline*" \
            --head "$BRANCH" \
            --label agent-generated \
            --label status/security-review 2>/dev/null || echo "PR may already exist"

      - name: Dispatch review
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${context.repo.owner}:agent/issue-${process.env.ISSUE_NUMBER}`,
              state: 'open'
            });
            if (prs.data.length > 0) {
              await github.rest.repos.createDispatchEvent({
                owner: context.repo.owner, repo: context.repo.repo,
                event_type: 'agent-pr-ready',
                client_payload: { pr_number: prs.data[0].number }
              });
            }

  notify:
    needs: implement
    if: always()
    runs-on: agent-runner
    steps:
      - name: Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RESULT: ${{ needs.implement.result }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && exit 0
          MSG="Agent Task ${RESULT}: ${{ github.repository }} #${ISSUE_NUMBER}"
          curl -sf -X POST "$SLACK_WEBHOOK_URL" -H 'Content-Type: application/json' -d "{\"text\":\"$MSG\"}" || true

      - name: Cleanup labels
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: Number(process.env.ISSUE_NUMBER), name: 'status/coding' }); } catch(e) {}
