name: Reusable - Agent SPECS.md Maintenance

on:
  workflow_call:
    inputs:
      repo-type:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true

env:
  REPO_TYPE: ${{ inputs.repo-type }}

jobs:
  specs:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if spec-relevant files changed
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          RELEVANT=$(echo "$CHANGED" | grep -E '\.(ts|js|go|py|json|yml|yaml)$|package\.json|go\.mod|Dockerfile|docker-compose' || true)
          if [ -n "$RELEVANT" ]; then
            echo "should_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update SPECS.md with Opus
        if: steps.check.outputs.should_update == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-opus-4-6 --max-turns 20"
          prompt: |
            You are a documentation agent at VerXus.

            Repo type from env REPO_TYPE.

            Review the latest commit changes and update SPECS.md to reflect the current state.
            If SPECS.md does not exist, create it.

            SPECS.md should include:
            - Project overview and purpose
            - Architecture and directory structure
            - Key modules and their responsibilities
            - API endpoints (if applicable)
            - Environment variables and configuration
            - Build and deploy instructions
            - Dependencies and their purposes

            Keep it concise but comprehensive. Only update sections affected by recent changes.

      - name: Commit SPECS.md
        if: steps.check.outputs.should_update == 'true'
        run: |
          git add SPECS.md
          if ! git diff --cached --quiet; then
            git commit -m "agent: update SPECS.md"
            git push
          fi
