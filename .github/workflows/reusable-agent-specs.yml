name: Reusable - Agent SPECS.md Maintenance

on:
  workflow_call:
    inputs:
      repo-type:
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: true

env:
  REPO_TYPE: ${{ inputs.repo-type }}

jobs:
  specs:
    runs-on: agent-runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if spec-relevant files changed
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          RELEVANT=$(echo "$CHANGED" | grep -E '\.(ts|js|go|py|json|yml|yaml)$|package\.json|go\.mod|Dockerfile|docker-compose' || true)
          if [ -n "$RELEVANT" ]; then
            echo "should_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup
        if: steps.check.outputs.should_update == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup git
        if: steps.check.outputs.should_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "verxus-agent[bot]"
          git config user.email "agent@verxus.io"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Update SPECS.md (Haiku)
        if: steps.check.outputs.should_update == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20)
          npx --yes @anthropic-ai/claude-code@latest -p \
            "Update SPECS.md to reflect recent changes. Changed files: ${CHANGED}. Read the current SPECS.md and the changed files. ADD new deps/modules/routes, UPDATE changed versions/descriptions, REMOVE deleted items. Keep same format. Only change sections affected by the commit. If nothing meaningful changed, do nothing." \
            --model claude-haiku-4-5-20251001 \
            --max-turns 10 \
            --dangerously-skip-permissions

      - name: Commit SPECS.md
        if: steps.check.outputs.should_update == 'true'
        run: |
          git add SPECS.md
          if ! git diff --cached --quiet; then
            git commit -m "docs(specs): auto-update SPECS.md" \
                      -m "Co-Authored-By: Claude Haiku 4.5 <noreply@anthropic.com>"
            git push
          fi
