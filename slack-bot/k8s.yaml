apiVersion: v1
kind: Namespace
metadata:
  name: slack-bot
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-bot-secrets
  namespace: slack-bot
type: Opaque
stringData:
  SLACK_SIGNING_SECRET: "REPLACE_ME"
  SLACK_BOT_TOKEN: "REPLACE_ME"
  ANTHROPIC_API_KEY: "REPLACE_ME"
  GITHUB_TOKEN: "REPLACE_ME"
  LINEAR_API_KEY: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-bot
  namespace: slack-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack-bot
  template:
    metadata:
      labels:
        app: slack-bot
    spec:
      containers:
        - name: slack-bot
          image: slack-bot:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3333
          envFrom:
            - secretRef:
                name: slack-bot-secrets
          env:
            - name: GITHUB_ORG
              value: "verxusintel"
            - name: PORT
              value: "3333"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3333
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3333
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: slack-bot
  namespace: slack-bot
spec:
  type: NodePort
  selector:
    app: slack-bot
  ports:
    - port: 3333
      targetPort: 3333
      nodePort: 30333
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: slack-bot-egress
  namespace: slack-bot
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
